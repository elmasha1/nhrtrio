<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background tile, dark "ink" with subtle radius -->
  <rect width="64" height="64" rx="14" fill="#0f0d0a"/>
  <!-- Champagne hairline frame for an editorial feel -->
  <rect x="6" y="6" width="52" height="52" rx="10"
        fill="none" stroke="#c69b4e" stroke-opacity="0.6" stroke-width="1"/>
  <!-- Monogram "N · T" in display serif, matches the brand wordmark -->
  <text x="50%" y="54%" text-anchor="middle" dominant-baseline="middle"
        font-family="'Cormorant Garamond', 'Playfair Display', Georgia, serif"
        font-weight="600" font-size="30" fill="#f3f1ec"
        letter-spacing="0.5">
    N<tspan fill="#c69b4e" font-weight="700" dx="1" dy="-1">·</tspan><tspan dx="1" dy="1">T</tspan>
  </text>
</svg>
